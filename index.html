<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Expense Tracker</title>
</head>
<body>
    <div class="container">
        <h3 class="ID ">Hammad Naveed F2022266699</h3>
        <h2 class="Ok">Expense Tracker</h2>

        <form id="expense-form" class="mb-4">
            <div class="mb-4">
                <label for="description" class="form-label"></label>
                <input type="text" class="form-control" id="description" required placeholder="Expense Name">
            </div>
            <div class="mb-5">
                <label for="amount" class="form-label"></label>
                <input type="number" class="form-control" id="amount" required placeholder="Amount">
            </div>
            <select class="form-select mb-4" aria-label="Default select example">
              <option selected>Food Category</option>
               <option value="1">Fast Food</option>
               <option value="2">Desi</option>
                <option value="3">Drinks and Sweets</option>
</select>
<div class="mb-4">
                <label for="date" class="form-label"></label>
                <input type="date" class="form-control" id="date" required>
            
            </div>
                        <button type="submit" class="btn btn-success">Add Expense</button>
    
        </div>
        </form>
        <div class="table">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Expense Name</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="expense-table-body">
                    <!-- Expenses will be added here dynamically -->

                </tbody>
            </table>
        </div>
        <div class="total">
            <strong>Total</strong> $<span id="total-amount">0.00</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
